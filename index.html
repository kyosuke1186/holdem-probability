<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ホールデム役成立確率</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    padding:12px;
    font-family:Arial,sans-serif;
    background:#10161d;
    color:#fff;
    font-size:14px;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
  }
  h1{
    margin:0 0 8px;
    font-size:22px;
  }
  .sub{
    color:#9fb0bf;
    margin-bottom:10px;
    line-height:1.5;
    font-size:12px;
  }
  .box{
    background:#18222c;
    border:1px solid #2a3947;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
  }
  .row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
  }
  .slot-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .label{
    font-size:11px;
    color:#9fb0bf;
  }
  .slot{
    width:62px;
    height:84px;
    border-radius:10px;
    border:2px solid #3b4c5d;
    background:#22303b;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-weight:bold;
    user-select:none;
    transition:.12s;
    font-size:13px;
  }
  .slot:hover{transform:translateY(-1px)}
  .slot.active{
    border-color:#00d1ff;
    box-shadow:0 0 0 2px rgba(0,209,255,.18);
  }
  .slot.filled{
    background:#fff;
    color:#111;
  }
  .red{color:#d64040 !important}

  .controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:6px;
  }
  button{
    border:none;
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-weight:bold;
    font-size:12px;
  }
  .b1{background:#2d8cff;color:#fff}
  .b2{background:#ff6b6b;color:#fff}

  .deck-groups{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .suit-group{
    background:#141d25;
    border:1px solid #2a3947;
    border-radius:10px;
    padding:10px;
  }
  .suit-title{
    font-size:13px;
    font-weight:bold;
    margin-bottom:8px;
    color:#9fd3ff;
  }
  .suit-title.red-title{
    color:#ff8d8d;
  }
  .deck-row{
    display:grid;
    grid-template-columns:repeat(13,minmax(0,1fr));
    gap:6px;
  }
  .card{
    height:48px;
    border-radius:8px;
    border:1px solid #506272;
    background:#fff;
    color:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    font-size:14px;
  }
  .card.used{
    opacity:.28;
    cursor:not-allowed;
    background:#51606c;
    color:#c7d0d8;
  }

  .hero{
    background:linear-gradient(135deg,#1b2a36,#223f4d);
    border:1px solid #33586a;
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
  }
  .hero-label{
    font-size:12px;
    color:#9fd3ff;
    margin-bottom:6px;
  }
  .hero-hand{
    font-size:28px;
    font-weight:bold;
    margin-bottom:6px;
  }
  .hero-rate{
    font-size:38px;
    font-weight:bold;
    color:#00e676;
    line-height:1;
  }

  .prob-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .prob-item{
    background:#141d25;
    border:1px solid #2a3947;
    border-radius:10px;
    padding:10px;
  }
  .prob-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:8px;
  }
  .prob-name{
    font-weight:bold;
    font-size:15px;
  }
  .prob-rate{
    font-weight:bold;
    font-size:20px;
    color:#ffd166;
    white-space:nowrap;
  }
  .bar{
    width:100%;
    height:10px;
    background:#0d141a;
    border-radius:999px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:linear-gradient(90deg,#00d1ff,#00e676);
    border-radius:999px;
  }

  .muted{color:#8ea0af}

  @media (max-width:700px){
    .deck-row{grid-template-columns:repeat(4,minmax(0,1fr))}
    .hero-hand{font-size:24px}
    .hero-rate{font-size:34px}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>ホールデム役成立確率</h1>
  <div class="sub">カードを押すたびに次の枠へ自動で進みます。柄ごとに分けてあります。</div>

  <div class="box">
    <div class="row">
      <div class="slot-wrap"><div class="label">手札1</div><div class="slot" data-slot="h1">選択</div></div>
      <div class="slot-wrap"><div class="label">手札2</div><div class="slot" data-slot="h2">選択</div></div>
      <div class="slot-wrap"><div class="label">F1</div><div class="slot" data-slot="f1">選択</div></div>
      <div class="slot-wrap"><div class="label">F2</div><div class="slot" data-slot="f2">選択</div></div>
      <div class="slot-wrap"><div class="label">F3</div><div class="slot" data-slot="f3">選択</div></div>
      <div class="slot-wrap"><div class="label">T</div><div class="slot" data-slot="t">選択</div></div>
      <div class="slot-wrap"><div class="label">R</div><div class="slot" data-slot="r">選択</div></div>
    </div>
    <div class="controls">
      <button class="b1" onclick="sampleFlop()">フロップ例</button>
      <button class="b1" onclick="sampleTurn()">ターン例</button>
      <button class="b2" onclick="resetAll()">リセット</button>
      <button class="b1" onclick="clearActive()">選択中を消す</button>
    </div>
  </div>

  <div class="box">
    <div class="deck-groups" id="deckGroups"></div>
  </div>

  <div id="resultBox" class="box">
    <div class="muted">まだ計算していません。</div>
  </div>
</div>

<script>
const SUITS=["S","H","D","C"];
const SUIT_LABEL={
  S:"♠ スペード",
  H:"♥ ハート",
  D:"♦ ダイヤ",
  C:"♣ クラブ"
};
const RANKS=[14,13,12,11,10,9,8,7,6,5,4,3,2];
const SYM={S:"♠",H:"♥",D:"♦",C:"♣"};
const HANDS=["ハイカード","ワンペア","ツーペア","スリーカード","ストレート","フラッシュ","フルハウス","フォーカード","ストレートフラッシュ","ロイヤルフラッシュ"];
const slotNames=["h1","h2","f1","f2","f3","t","r"];
const slots={h1:null,h2:null,f1:null,f2:null,f3:null,t:null,r:null};
let active="h1";

const deckGroupsEl=document.getElementById("deckGroups");
const resultBox=document.getElementById("resultBox");

function rLabel(r){return r===14?"A":r===13?"K":r===12?"Q":r===11?"J":String(r)}
function red(s){return s==="H"||s==="D"}
function key(c){return c.suit+"-"+c.rank}
function txt(c){return SYM[c.suit]+rLabel(c.rank)}

function allDeck(){
  const d=[];
  for(const s of SUITS) for(const r of RANKS) d.push({suit:s,rank:r});
  return d;
}
function known(){return slotNames.map(k=>slots[k]).filter(Boolean)}
function remaining(){
  const used=new Set(known().map(key));
  return allDeck().filter(c=>!used.has(key(c)));
}
function choose(arr,k){
  const out=[];
  const n=arr.length;
  function go(i,path){
    if(path.length===k){out.push(path.slice());return}
    for(let x=i;x<n;x++){
      path.push(arr[x]);
      go(x+1,path);
      path.pop();
    }
  }
  go(0,[]);
  return out;
}
function countRanks(cards){
  const m={};
  for(const c of cards) m[c.rank]=(m[c.rank]||0)+1;
  return m;
}
function flush(cards){return cards.every(c=>c.suit===cards[0].suit)}
function straightHigh(ranks){
  const u=[...new Set(ranks)].sort((a,b)=>a-b);
  if(u.length!==5) return null;
  let ok=true;
  for(let i=1;i<u.length;i++) if(u[i]!==u[i-1]+1) ok=false;
  if(ok) return u[4];
  if(JSON.stringify(u)===JSON.stringify([2,3,4,5,14])) return 5;
  return null;
}
function eval5(cards){
  const ranks=cards.map(c=>c.rank);
  const groups=Object.entries(countRanks(cards))
    .map(([r,c])=>({rank:+r,count:c}))
    .sort((a,b)=>b.count-a.count||b.rank-a.rank);
  const isF=flush(cards);
  const sH=straightHigh(ranks);

  if(isF){
    const sr=[...new Set(ranks)].sort((a,b)=>a-b);
    if(JSON.stringify(sr)===JSON.stringify([10,11,12,13,14])) return {cat:10,name:"ロイヤルフラッシュ",tb:[14]};
  }
  if(isF&&sH) return {cat:9,name:"ストレートフラッシュ",tb:[sH]};
  if(groups[0].count===4) return {cat:8,name:"フォーカード",tb:[groups[0].rank,groups[1].rank]};
  if(groups[0].count===3&&groups[1].count===2) return {cat:7,name:"フルハウス",tb:[groups[0].rank,groups[1].rank]};
  if(isF) return {cat:6,name:"フラッシュ",tb:ranks.sort((a,b)=>b-a)};
  if(sH) return {cat:5,name:"ストレート",tb:[sH]};
  if(groups[0].count===3){
    const k=groups.filter(g=>g.count===1).map(g=>g.rank).sort((a,b)=>b-a);
    return {cat:4,name:"スリーカード",tb:[groups[0].rank,...k]};
  }
  if(groups[0].count===2&&groups[1].count===2){
    const p=groups.filter(g=>g.count===2).map(g=>g.rank).sort((a,b)=>b-a);
    const k=groups.find(g=>g.count===1).rank;
    return {cat:3,name:"ツーペア",tb:[...p,k]};
  }
  if(groups[0].count===2){
    const k=groups.filter(g=>g.count===1).map(g=>g.rank).sort((a,b)=>b-a);
    return {cat:2,name:"ワンペア",tb:[groups[0].rank,...k]};
  }
  return {cat:1,name:"ハイカード",tb:ranks.sort((a,b)=>b-a)};
}
function cmp(a,b){
  if(a.cat!==b.cat) return a.cat-b.cat;
  const n=Math.max(a.tb.length,b.tb.length);
  for(let i=0;i<n;i++){
    const x=a.tb[i]||0,y=b.tb[i]||0;
    if(x!==y) return x-y;
  }
  return 0;
}
function evalBest(cards){
  const cs=choose(cards,5);
  let best=null;
  for(const c of cs){
    const e=eval5(c);
    if(!best||cmp(e,best)>0) best=e;
  }
  return best;
}
function getStage(){
  const h=slots.h1&&slots.h2;
  const f=slots.f1&&slots.f2&&slots.f3;
  const t=!!slots.t;
  const r=!!slots.r;
  if(!h) return "pre";
  if(h&&f&&!t&&!r) return "flop";
  if(h&&f&&t&&!r) return "turn";
  if(h&&f&&t&&r) return "river";
  return "partial";
}
function renderSlots(){
  document.querySelectorAll(".slot").forEach(el=>{
    const s=el.dataset.slot;
    const c=slots[s];
    el.classList.remove("filled","red","active");
    if(active===s) el.classList.add("active");
    if(c){
      el.textContent=txt(c);
      el.classList.add("filled");
      if(red(c.suit)) el.classList.add("red");
    }else{
      el.textContent="選択";
    }
  });
}
function renderDeck(){
  const used=new Set(known().map(key));
  document.querySelectorAll(".card").forEach(el=>{
    el.classList.toggle("used",used.has(el.dataset.key));
  });
}
function renderAll(){
  renderSlots();
  renderDeck();
  autoCalc();
}
function nextEmptySlot(fromSlot){
  const startIndex=slotNames.indexOf(fromSlot);
  for(let i=startIndex+1;i<slotNames.length;i++){
    if(!slots[slotNames[i]]) return slotNames[i];
  }
  for(let i=0;i<slotNames.length;i++){
    if(!slots[slotNames[i]]) return slotNames[i];
  }
  return fromSlot;
}
function assign(card){
  if(!active) active="h1";
  const k=key(card);
  for(const s of slotNames){
    if(slots[s]&&key(slots[s])===k) slots[s]=null;
  }
  const current=active;
  slots[current]={...card};
  active=nextEmptySlot(current);
  renderAll();
}
function clearActive(){
  if(!active) return;
  slots[active]=null;
  renderAll();
}
function resetAll(){
  for(const s of slotNames) slots[s]=null;
  active="h1";
  renderAll();
}
function sampleFlop(){
  resetAll();
  slots.h1={suit:"S",rank:14};
  slots.h2={suit:"S",rank:13};
  slots.f1={suit:"S",rank:12};
  slots.f2={suit:"D",rank:11};
  slots.f3={suit:"S",rank:2};
  active="t";
  renderAll();
}
function sampleTurn(){
  resetAll();
  slots.h1={suit:"H",rank:9};
  slots.h2={suit:"H",rank:8};
  slots.f1={suit:"H",rank:2};
  slots.f2={suit:"C",rank:6};
  slots.f3={suit:"D",rank:7};
  slots.t={suit:"S",rank:14};
  active="r";
  renderAll();
}
function autoCalc(){
  const stage=getStage();

  if(stage==="pre"){
    resultBox.innerHTML=`<div class="muted">手札2枚と、少なくともフロップ3枚まで入れると自動計算します。</div>`;
    return;
  }

  if(stage==="partial"){
    resultBox.innerHTML=`<div class="muted">フロップ3枚まで入れてください。</div>`;
    return;
  }

  const cnt={};
  HANDS.forEach(h=>cnt[h]=0);

  if(stage==="river"){
    const e=evalBest(known());
    cnt[e.name]=1;
    renderProbabilities(cnt,1,"最終的な役");
    return;
  }

  if(stage==="turn"){
    const rem=remaining();
    for(const c of rem){
      const e=evalBest([...known(),c]);
      cnt[e.name]++;
    }
    renderProbabilities(cnt,rem.length,"ターン時点の最終役確率");
    return;
  }

  if(stage==="flop"){
    const rem=remaining();
    const futures=choose(rem,2);
    for(const pair of futures){
      const e=evalBest([...known(),...pair]);
      cnt[e.name]++;
    }
    renderProbabilities(cnt,futures.length,"フロップ時点の最終役確率");
  }
}
function renderProbabilities(cnt,total,title){
  const items=HANDS.map(name=>({
    name,
    rateNum:(cnt[name]/total)*100
  }))
  .filter(item=>item.rateNum > 0)
  .sort((a,b)=>b.rateNum-a.rateNum);

  const top=items[0];
  const list=items.map(item=>`
    <div class="prob-item">
      <div class="prob-top">
        <div class="prob-name">${item.name}</div>
        <div class="prob-rate">${item.rateNum.toFixed(1)}%</div>
      </div>
      <div class="bar">
        <div class="bar-fill" style="width:${item.rateNum}%;"></div>
      </div>
    </div>
  `).join("");

  resultBox.innerHTML=`
    <div class="hero">
      <div class="hero-label">${title}</div>
      <div class="hero-hand">${top.name}</div>
      <div class="hero-rate">${top.rateNum.toFixed(1)}%</div>
    </div>
    <div class="prob-list">${list}</div>
  `;
}

for(const s of slotNames){
  document.querySelector(`.slot[data-slot="${s}"]`).addEventListener("click",()=>{
    active=s;
    renderSlots();
  });
}

for(const suit of SUITS){
  const group=document.createElement("div");
  group.className="suit-group";

  const title=document.createElement("div");
  title.className="suit-title" + (red(suit) ? " red-title" : "");
  title.textContent=SUIT_LABEL[suit];

  const row=document.createElement("div");
  row.className="deck-row";

  for(const rank of RANKS){
    const c={suit,rank};
    const el=document.createElement("div");
    el.className="card"+(red(suit)?" red":"");
    el.dataset.key=key(c);
    el.textContent=txt(c);
    el.addEventListener("click",()=>{
      if(el.classList.contains("used")) return;
      assign(c);
    });
    row.appendChild(el);
  }

  group.appendChild(title);
  group.appendChild(row);
  deckGroupsEl.appendChild(group);
}

renderAll();
</script>
</body>
</html>
